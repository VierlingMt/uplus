; PHP-Limits für Uploads (Businesspläne, Mediengalerie). Greift bei PHP als FPM/CGI.
; Änderungen können bis zu 5 Min. (user_ini.cache_ttl) brauchen.
; post_max_size begrenzt die GESAMTgröße einer Anfrage – wichtig für den
; Mehrfach-Upload der Mediengalerie (mehrere Bilder/Videos auf einmal).
upload_max_filesize = 64M
post_max_size = 320M
memory_limit = 256M
max_execution_time = 300
max_file_uploads = 40
